<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a" />
      <stop offset="1" stop-color="#1e1b4b" />
    </linearGradient>
    <radialGradient id="atom1" cx="35%" cy="35%" r="65%">
      <stop stop-color="#a5f3fc" />
      <stop offset="40%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#083344" />
    </radialGradient>
    <radialGradient id="atom2" cx="35%" cy="35%" r="65%">
      <stop stop-color="#f5d0fe" />
      <stop offset="40%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b0764" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Decorative background elements -->
  <circle cx="1000" cy="100" r="400" fill="#4f46e5" opacity="0.15" filter="blur(80px)" />
  <circle cx="200" cy="500" r="300" fill="#06b6d4" opacity="0.15" filter="blur(80px)" />

  <!-- Text Content -->
  <g transform="translate(100, 280)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="-0.02em">BondLab</text>
    <text x="0" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="600" fill="#38bdf8" letter-spacing="-0.01em">Interactive Molecule Builder</text>
    <text x="0" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Build molecules in 3D. Explore bond order,</text>
    <text x="0" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">polarity, and stability.</text>
  </g>

  <!-- Logo -->
  <g transform="translate(780, 155) scale(10)">
    <path d="M 8.5 20.5 L 20.5 8.5" stroke="white" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)" />
    <path d="M 11.5 23.5 L 23.5 11.5" stroke="white" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)" />
    <circle cx="10" cy="22" r="7" fill="url(#atom1)" filter="url(#shadow)" />
    <circle cx="22" cy="10" r="7" fill="url(#atom2)" filter="url(#shadow)" />
  </g>
</svg>